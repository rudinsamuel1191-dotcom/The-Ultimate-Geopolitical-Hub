<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEO-INTEL | Terminal v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: #fafafa; }
        .mono { font-family: 'JetBrains Mono', monospace; }
        #map { height: 550px; width: 100%; background: #0a0a0a; border-bottom: 1px solid #27272a; }
        .glass-panel { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(8px); border: 1px solid #27272a; }
        .feed-card:hover { border-color: #ef4444; background: #111; transition: all 0.2s ease; }
    </style>
</head>
<body class="antialiased overflow-x-hidden">

    <header class="p-5 flex justify-between items-center border-b border-zinc-800 sticky top-0 bg-[#050505] z-[1001]">
        <div>
            <h1 class="text-2xl font-black tracking-tighter">GEO<span class="text-red-600">INTEL</span></h1>
            <p id="status-bar" class="text-[9px] mono text-zinc-500 uppercase">Monitoring Global Pulse: <span class="text-green-500 animate-pulse">Online</span></p>
        </div>
        <div class="flex items-center space-x-4">
            <div id="active-country" class="hidden md:block text-[10px] mono bg-zinc-900 px-3 py-1 rounded border border-zinc-700">GLOBAL VIEW</div>
            <button class="bg-red-600 text-white text-[10px] font-bold px-4 py-2 uppercase">Log Intel</button>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-0">
        <div class="lg:col-span-8 relative">
            <div id="map"></div>
            <div class="absolute bottom-4 left-4 z-[1000] glass-panel p-3 rounded text-[10px] mono text-zinc-400">
                CLICK COUNTRY TO FILTER INTEL
            </div>
        </div>

        <aside class="lg:col-span-4 h-[550px] lg:h-screen border-l border-zinc-800 flex flex-col">
            <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
                <h2 class="text-xs font-bold uppercase tracking-widest text-zinc-400">Intelligence Feed</h2>
                <span id="feed-count" class="text-[10px] bg-zinc-800 px-2 py-0.5 rounded">8 New</span>
            </div>
            
            <div id="intel-container" class="overflow-y-auto p-4 space-y-4 flex-grow">
                </div>
        </aside>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // MOCK DATA: For a "Legit" feel, these would come from your Substack/RSS/News APIs
        const intelDatabase = {
            "Global": [
                { type: 'SUBSTACK', title: 'The End of Globalization 2.0', source: 'https://zeihan.com/blog/', desc: 'Analyzing the shift to localized manufacturing.', time: '12m ago' },
                { type: 'VIDEO', title: 'Energy Hegemony 2026', source: 'https://youtube.com', desc: 'New pipelines and the shift in EU energy reliance.', time: '1h ago' }
            ],
            "United States": [
                { type: 'ECONOMY', title: 'The 2026 Dollar Dominance Report', source: 'https://substack.com', desc: 'Why the DXY remains the ultimate sanctuary.', time: '5m ago' },
                { type: 'TECH', title: 'Silicon Shield: Semi-conductors', source: 'https://bloomberg.com', desc: 'New US-based fabs reaching operational status.', time: '3h ago' }
            ],
            "China": [
                { type: 'MACRO', title: 'Belt and Road Debt Restructuring', source: 'https://reuters.com', desc: 'Financial shifts in East African investments.', time: '20m ago' },
                { type: 'MILITARY', title: 'Naval Expansion in South China Sea', source: 'https://janes.com', desc: 'Satellite imagery confirms new carrier dock.', time: '5h ago' }
            ]
        };

        // 1. Initialize Map
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // 2. Feed Management Function
        function renderFeed(country) {
            const container = document.getElementById('intel-container');
            const label = document.getElementById('active-country');
            const data = intelDatabase[country] || intelDatabase["Global"];
            
            label.innerText = country.toUpperCase();
            container.innerHTML = ''; // Clear feed

            data.forEach(item => {
                container.innerHTML += `
                    <div class="glass-panel p-4 rounded-lg feed-card group cursor-pointer border-l-2 border-l-transparent hover:border-l-red-600">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[9px] bg-zinc-800 text-zinc-300 px-2 py-0.5 rounded">${item.type}</span>
                            <span class="text-[9px] text-zinc-600">${item.time}</span>
                        </div>
                        <a href="${item.source}" target="_blank" class="text-sm font-bold block hover:text-red-500 transition mb-2">
                            ${item.title} ↗
                        </a>
                        <p class="text-xs text-zinc-400 leading-relaxed">${item.desc}</p>
                    </div>
                `;
            });
        }

        // 3. Interactive Markers (Using circles for better "Radar" aesthetic)
        const pins = [
            { name: 'United States', pos: [37.09, -95.71] },
            { name: 'China', pos: [35.86, 104.19] },
            { name: 'Russia', pos: [61.52, 105.31] }
        ];

        pins.forEach(pin => {
            const m = L.circleMarker(pin.pos, {
                color: '#ef4444', radius: 10, fillOpacity: 0.5
            }).addTo(map);
            
            m.on('click', () => {
                map.flyTo(pin.pos, 4);
                renderFeed(pin.name);
            });
        });

        // 4. Map Click (Reset to Global)
        map.on('click', (e) => {
            if (e.originalEvent.target.id === 'map') {
                renderFeed("Global");
            }
        });

        // Initial Load
        renderFeed("Global");
    </script>
</body>
</html>
